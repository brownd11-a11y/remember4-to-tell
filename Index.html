    const { useState, useEffect, useRef, useCallback } = React;

    // Storage polyfill using localStorage (since window.storage is Claude-specific)
    window.storage = {
      get: (key) => {
        try {
          const val = localStorage.getItem(key);
          return Promise.resolve(val ? { value: val } : null);
        } catch(e) { return Promise.resolve(null); }
      },
      set: (key, value) => {
        try {
          localStorage.setItem(key, value);
          return Promise.resolve({ key, value });
        } catch(e) { return Promise.resolve(null); }
      },
      delete: (key) => {
        try {
          localStorage.removeItem(key);
          return Promise.resolve({ key, deleted: true });
        } catch(e) { return Promise.resolve(null); }
      }
    };

const TIME_OPTS  = [{label:'Today',ms:86400000},{label:'Week',ms:604800000},{label:'Month',ms:2592000000},{label:'3 Months',ms:7776000000},{label:'6 Months',ms:15552000000},{label:'All time',ms:Infinity}];
const SORT_OPTS  = [{label:'Newest first',key:'desc'},{label:'Oldest first',key:'asc'},{label:'By person',key:'person'}];

function pColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffffffff;return PC[Math.abs(h)%PC.length];}

function timeAgo(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return'just now';
  if(m<60)return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24)return h+'h ago';
  const dy=Math.floor(h/24);
  if(dy<7)return dy+'d ago';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtDT(ts){return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function toTitle(s){return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();}

// ── Date/time parser ─────────────────────────────────────────────────────────
function parseDateTime(text){
  const now=new Date();
  const tod=now.getDay();
  const DAYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const MONTHS=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const MSHORT=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  let clean=text;
  let scheduledAt=null;
  const mkTime=(base,h,min,ap)=>{
    let hh=parseInt(h),mm=parseInt(min||0);
    const a=(ap||'').toLowerCase();
    if(a==='pm'&&hh<12)hh+=12;
    if(a==='am'&&hh===12)hh=0;
    base.setHours(hh,mm,0,0);
    return base.getTime();
  };
  const patterns=[
    {rx:/\b(today|tomorrow)\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/i,fn(m){
      const b=new Date(now);if(m[1].toLowerCase()==='tomorrow')b.setDate(b.getDate()+1);
      return mkTime(b,m[2],m[3],m[4]);
    }},
    {rx:/\b(today|tomorrow)\b/i,fn(m){
      const b=new Date(now);if(m[1].toLowerCase()==='tomorrow')b.setDate(b.getDate()+1);
      b.setHours(9,0,0,0);return b.getTime();
    }},
    {rx:/\bnext\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)(?:\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?)?\b/i,fn(m){
      const b=new Date(now);const t=DAYS.indexOf(m[1].toLowerCase());
      b.setDate(b.getDate()+((t-tod+7)%7||7));
      return m[2]?mkTime(b,m[2],m[3],m[4]):(b.setHours(9,0,0,0),b.getTime());
    }},
    {rx:/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)(?:\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?)?\b/i,fn(m){
      const b=new Date(now);const t=DAYS.indexOf(m[1].toLowerCase());
      b.setDate(b.getDate()+((t-tod+7)%7||7));
      return m[2]?mkTime(b,m[2],m[3],m[4]):(b.setHours(9,0,0,0),b.getTime());
    }},
    {rx:/\b(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\s+(\d{1,2})(?:\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?)?\b/i,fn(m){
      const ml=[...MONTHS,...MSHORT];let mi=ml.indexOf(m[1].toLowerCase());if(mi>=12)mi-=12;
      const b=new Date(now.getFullYear(),mi,parseInt(m[2]));
      if(b<now)b.setFullYear(b.getFullYear()+1);
      return m[3]?mkTime(b,m[3],m[4],m[5]):(b.setHours(9,0,0,0),b.getTime());
    }},
    {rx:/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?(?:\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?)?\b/,fn(m){
      const yr=m[3]?(m[3].length===2?2000+parseInt(m[3]):parseInt(m[3])):now.getFullYear();
      const b=new Date(yr,parseInt(m[1])-1,parseInt(m[2]));
      if(!m[3]&&b<now)b.setFullYear(b.getFullYear()+1);
      return m[4]?mkTime(b,m[4],m[5],m[6]):(b.setHours(9,0,0,0),b.getTime());
    }},
    {rx:/\bat\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i,fn(m){
      const b=new Date(now);const t=mkTime(b,m[1],m[2],m[3]);
      return t<Date.now()?(b.setDate(b.getDate()+1),mkTime(b,m[1],m[2],m[3])):t;
    }},
  ];
  for(const p of patterns){
    const m=clean.match(p.rx);
    if(m){scheduledAt=p.fn(m);clean=clean.replace(m[0],'').replace(/\s+/g,' ').replace(/,\s*$/,'').trim();clean=clean.charAt(0).toUpperCase()+clean.slice(1);break;}
  }
  return{scheduledAt,cleanText:clean};
}

// ── Name parser ───────────────────────────────────────────────────────────────
function parseSnippet(raw,mode){
  let text=raw.trim();const found=new Set();
  const tTell=text.match(/^(?:remind(?:\s+me)?\s+to\s+tell|remind|tell)\s+([\w][\w\s,&]+?)\s+(?:about|to|that|regarding)/i);
  const tTold=text.match(/^([\w][\w\s,&]+?)\s+told\s+me\s+(?:about|that|regarding)?/i)||text.match(/^(?:told\s+me\s+by)\s+([\w][\w\s,&]+)/i);
  const trigger=mode==='tell'?tTell:(tTold||tTell);
  if(trigger){
    trigger[1].split(/\band\b|,|&/i).forEach(n=>{const t=n.trim();if(t&&!STOP.has(t.toLowerCase()))found.add(toTitle(t));});
    text=text.slice(trigger[0].length).trim();text=text.charAt(0).toUpperCase()+text.slice(1);
  }
  const{scheduledAt,cleanText}=parseDateTime(text);text=cleanText;
  (text.match(/\b[A-Z][a-z]{1,14}\b/g)||[]).forEach(w=>{if(!STOP.has(w.toLowerCase()))found.add(w);});
  // Extract hashtags
  const { tags, cleanText: taggedClean } = parseTags(text);
  return { cleanText: taggedClean, detectedNames: [...found], scheduledAt, tags };
}

function Btn({onClick,children,style={},disabled=false}){
  return <button onClick={onClick} disabled={disabled} style={{cursor:disabled?'default':'pointer',border:'none',fontFamily:'inherit',...style}}>{children}</button>;
}


// ── Hashtag parser ────────────────────────────────────────────────────────────
// Extracts #tags from text, returns { cleanText, tags }
function parseTags(text) {
  const tags = [];
  const clean = text.replace(/#(\w+)/g, (_, tag) => {
    tags.push(tag.toLowerCase());
    return tag; // keep the word in text, just remove the #
  }).replace(/\s+/g, ' ').trim();
  return { tags, cleanText: clean };
}

  const preview=snippet.text.length>46?snippet.text.slice(0,43)+'...':snippet.text;
  const handlePI=v=>{setPiVal(v);setPiSug(v.trim()?allPeople.filter(p=>p.toLowerCase().includes(v.toLowerCase())&&!snippet.people.includes(p)):[]);};
  const addPerson=name=>{const t=name.trim();if(t&&!snippet.people.includes(t))onUpdate({people:[...snippet.people,t]});setPiVal('');setPiSug([]);setShowPI(false);};
  const removePerson=name=>onUpdate({people:snippet.people.filter(p=>p!==name),sharedWith:sw.filter(p=>p!==name)});
  const toggleShared=name=>onUpdate({sharedWith:sw.includes(name)?sw.filter(p=>p!==name):[...sw,name]});
  const addPhoto=src=>onUpdate({photos:[...(snippet.photos||[]),src]});
  const removePhoto=i=>onUpdate({photos:(snippet.photos||[]).filter((_,idx)=>idx!==i)});
  const startEdit=()=>{setEditVal(snippet.text);setEditing(true);};
  const saveEdit=()=>{
    const t=editVal.trim();
    if(!t){setEditing(false);return;}
    // Re-parse tags from edited text
    const{tags,cleanText}=parseTags(t);
    onUpdate({text:cleanText,tags:[...new Set([...(snippet.tags||[]),...tags])]});
    setEditing(false);
  };
  return(
    <>
      {showSched&&<ScheduleModal snippet={snippet} onSave={upd=>onUpdate(upd)} onClose={()=>setShowSched(false)} />}
      {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,zIndex:1002,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center'}}><img src={lightbox} style={{maxWidth:'95vw',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}} alt='' /></div>}
      <div style={{background:isDone?CARD_DONE:accent.bg,border:'1px solid '+(isDone?'rgba(0,0,0,0.08)':accent.bd),borderRadius:14,marginBottom:8,opacity:isDone?0.6:1,boxShadow:'0 2px 12px rgba(0,0,0,0.1)',transition:'opacity 0.25s',overflow:'visible'}}>

        {/* Collapsed row */}
        <div onClick={()=>setLocalExp(e=>!e)} style={{display:'flex',alignItems:'center',gap:8,padding:'12px 13px',cursor:'pointer',userSelect:'none',minWidth:0}}>
          <span style={{fontSize:10,color:accent.ac,transform:isExp?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s',flexShrink:0}}>&#9658;</span>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.07em',color:accent.ac,flexShrink:0,minWidth:isTell?54:46,textTransform:'uppercase'}}>{accent.lb}</span>
          <span style={{flex:1,fontSize:13,color:isDone?TEXT_MUTE:TEXT_PRI,fontFamily:'Georgia,serif',lineHeight:1.35,textDecoration:isDone?'line-through':'none',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',minWidth:0}}>{preview}</span>
          <div style={{display:'flex',gap:4,flexShrink:0,alignItems:'center'}}>
            {!isExp&&(snippet.tags||[]).slice(0,2).map(t=><span key={t} style={{fontSize:10,color:'#1A5C9E',background:'rgba(36,113,163,0.09)',borderRadius:8,padding:'1px 5px',fontWeight:600}}>#{t}</span>)}
            {!isExp&&unres.slice(0,2).map(p=><PersonTag key={p} name={p} sharedWith={[]} readonly small />)}
            {!isExp&&unres.length>2&&<span style={{fontSize:10,color:TEXT_MUTE}}>+{unres.length-2}</span>}
            {!isExp&&(snippet.photos||[]).length>0&&<span style={{fontSize:11,color:TEXT_MUTE}}>&#128247;</span>}
            {!isExp&&snippet.scheduledAt&&<span style={{width:6,height:6,borderRadius:'50%',background:isPast?'#c0392b':accent.ac,flexShrink:0}} />}
            {isDone&&<span style={{fontSize:11,color:'#1E8449',fontWeight:700}}>&#10003;</span>}
          </div>
        </div>

        {/* Expanded body */}
        {isExp&&(
          <div style={{borderTop:'1px solid rgba(0,0,0,0.07)',padding:'14px 14px 12px'}}>
            {snippet.scheduledAt&&<div style={{display:'inline-flex',alignItems:'center',gap:5,background:isPast?'rgba(192,57,43,0.08)':'rgba(36,113,163,0.08)',border:'1px solid '+(isPast?'rgba(192,57,43,0.25)':'rgba(36,113,163,0.25)'),borderRadius:20,padding:'3px 10px',marginBottom:10,fontSize:11,color:isPast?'#c0392b':'#1A5C9E',fontWeight:600}}>&#128336; {fmtDT(snippet.scheduledAt)}{snippet.scheduledFor?' · '+snippet.scheduledFor:''}{isPast?' (past)':''}</div>}
            {editing ? (
              <div style={{marginBottom:8}}>
                <textarea
                  value={editVal}
                  onChange={e=>setEditVal(e.target.value)}
                  autoFocus
                  rows={3}
                  style={{width:'100%',background:'white',border:'1px solid '+BORDER,borderRadius:10,padding:'8px 10px',fontSize:15,lineHeight:1.65,color:TEXT_PRI,fontFamily:'Georgia,serif',outline:'none',resize:'none',boxSizing:'border-box'}}
                  onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))saveEdit();if(e.key==='Escape'){setEditing(false);}}}
                />
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  <Btn onClick={saveEdit} style={{background:'#2471A3',color:'white',borderRadius:8,padding:'5px 14px',fontSize:12,fontWeight:700}}>Save</Btn>
                  <Btn onClick={()=>setEditing(false)} style={{background:'rgba(0,0,0,0.05)',border:'1px solid '+BORDER,borderRadius:8,padding:'5px 12px',fontSize:12,color:TEXT_SEC}}>Cancel</Btn>
                </div>
              </div>
            ) : (
              <p onClick={startEdit} style={{margin:'0 0 5px',fontSize:15,lineHeight:1.7,color:isDone?TEXT_MUTE:TEXT_PRI,fontFamily:'Georgia,serif',textDecoration:isDone?'line-through':'none',cursor:'text',borderRadius:6,padding:'2px 4px',transition:'background 0.15s'}} title='Tap to edit'
                onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.04)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >{snippet.text}</p>
            )}
            <div style={{fontSize:11,color:TEXT_MUTE,marginBottom:8,letterSpacing:'0.02em'}}>{new Date(snippet.createdAt).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} &middot; {timeAgo(snippet.createdAt)}</div>
            {(snippet.tags||[]).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>{(snippet.tags||[]).map(t=><span key={t} style={{fontSize:11,fontWeight:600,color:'#1A5C9E',background:'rgba(36,113,163,0.1)',border:'1px solid rgba(36,113,163,0.22)',borderRadius:12,padding:'2px 8px'}}>#{t}</span>)}</div>}
            <PhotoStrip photos={snippet.photos||[]} onAdd={addPhoto} onRemove={removePhoto} />
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12,alignItems:'center'}}>
              {snippet.people.map(p=>(<PersonTag key={p} name={p} sharedWith={isTell?sw:(isDone?snippet.people:[])} onToggle={isTell?toggleShared:undefined} onRemove={isDone?null:removePerson} readonly={!isTell} />))}
              {!isDone&&(showPI?(<div style={{position:'relative'}}><input value={piVal} onChange={e=>handlePI(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&piVal.trim())addPerson(piVal);if(e.key==='Escape'){setShowPI(false);setPiVal('');}}} placeholder='Name...' autoFocus style={{background:'white',border:'1px solid '+BORDER,borderRadius:20,padding:'3px 10px',color:TEXT_PRI,fontSize:12,width:100,outline:'none'}} />{piSug.length>0&&(<div style={{position:'absolute',top:'100%',left:0,zIndex:10,background:'white',border:'1px solid '+BORDER,borderRadius:8,overflow:'hidden',marginTop:4,minWidth:120,boxShadow:'0 4px 16px rgba(0,0,0,0.12)'}}>{piSug.map(s=><div key={s} onClick={()=>addPerson(s)} style={{padding:'7px 12px',cursor:'pointer',fontSize:13,color:TEXT_PRI}} onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.04)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{s}</div>)}</div>)}</div>):(<button onClick={e=>{e.stopPropagation();setShowPI(true);}} style={{background:'rgba(0,0,0,0.04)',border:'1px dashed rgba(0,0,0,0.2)',borderRadius:20,padding:'2px 10px',color:TEXT_SEC,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>+ person</button>))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {isTell&&<Btn onClick={e=>{e.stopPropagation();setShowSched(true);}} style={{background:snippet.scheduledAt?'rgba(36,113,163,0.1)':'rgba(0,0,0,0.05)',border:'1px solid '+(snippet.scheduledAt?'rgba(36,113,163,0.3)':'rgba(0,0,0,0.12)'),borderRadius:8,padding:'5px 10px',color:snippet.scheduledAt?'#1A5C9E':TEXT_SEC,fontSize:11,fontWeight:600}}>&#128336; {snippet.scheduledAt?'Reschedule':'Schedule'}</Btn>}
                {!isTell&&<Btn onClick={()=>onUpdate({done:!isDone})} style={{background:isDone?'rgba(30,132,73,0.1)':'rgba(0,0,0,0.05)',border:'1px solid '+(isDone?'rgba(30,132,73,0.3)':'rgba(0,0,0,0.12)'),borderRadius:8,padding:'5px 12px',color:isDone?'#1E8449':TEXT_SEC,fontSize:11,fontWeight:700}}>{isDone?'&#10003; Done':'Mark done'}</Btn>}
              </div>
              <Btn onClick={e=>{e.stopPropagation();onDelete();}} style={{background:'none',color:'#bbb',fontSize:18,padding:'2px 6px',lineHeight:1}}>&#xd7;</Btn>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ── Input Area ────────────────────────────────────────────────────────────────
function InputArea({onAdd,allPeople}){
  const [mode,setMode]=useState('tell');
  const [input,setInput]=useState('');
  const [review,setReview]=useState(null);
  const handleAdd=()=>{
    const raw=input.trim();if(!raw)return;
    const{cleanText,detectedNames,scheduledAt,tags}=parseSnippet(raw,mode);
    if(detectedNames.length>0){setReview({cleanText,detectedNames,scheduledAt,tags});}
    else{onAdd({text:cleanText,mode,people:[],scheduledAt,tags});setInput('');}
  };
  const confirmReview=approved=>{onAdd({text:review.cleanText,mode,people:approved,scheduledAt:review.scheduledAt,tags:review.tags||[]});setInput('');setReview(null);};
  const accent=mode==='tell'?TELL:TOLD;
  return(
    <>
      {review&&<NameReviewModal detectedNames={review.detectedNames} knownPeople={allPeople} cleanText={review.cleanText} scheduledAt={review.scheduledAt} onConfirm={confirmReview} onCancel={()=>setReview(null)} />}
      <div style={{background:SURFACE2,borderRadius:18,padding:16,marginBottom:16,boxShadow:'0 2px 16px rgba(0,0,0,0.1)',border:'1px solid '+(mode==='tell'?accent.bd:accent.bd),transition:'border-color 0.2s'}}>
        {/* Mode toggle */}
        <div style={{display:'flex',gap:0,marginBottom:12,background:'rgba(0,0,0,0.05)',borderRadius:10,padding:3}}>
          {[{key:'tell',a:TELL,lb:'&#128226; Tell Them'},{key:'told',a:TOLD,lb:'&#128172; Told Me'}].map(({key,a,lb})=>(
            <button key={key} onClick={()=>setMode(key)} style={{flex:1,background:mode===key?a.bg:'transparent',border:'1px solid '+(mode===key?a.bd:'transparent'),borderRadius:8,padding:'8px 0',cursor:'pointer',color:mode===key?a.ac:TEXT_MUTE,fontSize:12,fontWeight:mode===key?700:400,transition:'all 0.18s',fontFamily:'inherit'}} dangerouslySetInnerHTML={{__html:lb}} />
          ))}
        </div>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))handleAdd();}}
          placeholder={mode==='tell'?'e.g. Tell Mark about the new golf course tomorrow at 4pm...':'e.g. Jane told me she is looking for a new car yesterday...'}
          rows={3}
          style={{width:'100%',background:'none',border:'none',outline:'none',color:TEXT_PRI,fontSize:14,lineHeight:1.65,resize:'none',fontFamily:'Georgia,serif',boxSizing:'border-box'}} />
        <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',marginTop:8,gap:8}}>
          <span style={{fontSize:11,color:TEXT_MUTE}}>&#8984;&#8629;</span>
          <Btn onClick={handleAdd} disabled={!input.trim()} style={{background:input.trim()?accent.ac:'#ccc',color:'white',borderRadius:10,padding:'8px 22px',fontSize:13,fontWeight:700,transition:'all 0.15s'}}>Add</Btn>
        </div>
      </div>
    </>
  );
}

// ── Drop Menu ───────────────────────────────────────────────────────────────
function DropMenu({items,selected,onSelect,onClose}){
  return(
    <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',zIndex:200,background:SURFACE2,border:'1px solid '+BORDER,borderRadius:10,overflow:'hidden',minWidth:148,boxShadow:'0 6px 24px rgba(0,0,0,0.13)'}}>
      {items.map(o=><div key={o} onClick={()=>{onSelect(o);onClose();}} style={{padding:'9px 16px',cursor:'pointer',fontSize:13,color:selected===o?'#1A5C9E':TEXT_PRI,background:selected===o?'rgba(36,113,163,0.07)':'transparent',fontWeight:selected===o?700:400}} onMouseEnter={e=>{if(selected!==o)e.currentTarget.style.background='rgba(0,0,0,0.04)';}} onMouseLeave={e=>{if(selected!==o)e.currentTarget.style.background='transparent';}}>{o}</div>)}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [snippets,setSnippets]=useState([]);
  const [filters,setFilters]=useState({timeMs:Infinity,status:'All',people:[],tags:[]});
  const [searchQuery,setSearchQuery]=useState('');
  const [sortKey,setSortKey]=useState('desc');
  const [typeFilter,setTypeFilter]=useState('All');
  const [viewMode,setViewMode]=useState('collapsed');
  const [showFilter,setShowFilter]=useState(false);
  const [showSort,setShowSort]=useState(false);
  const [showView,setShowView]=useState(false);
  const [showType,setShowType]=useState(false);

  useEffect(()=>{(async()=>{try{const r=await window.storage.get('rtell_v5');if(r)setSnippets(JSON.parse(r.value));}catch(e){}})();},[]);
  useEffect(()=>{if(!snippets.length)return;window.storage.set('rtell_v5',JSON.stringify(snippets)).catch(()=>{});},[snippets]);

  const allPeople=[...new Set(snippets.flatMap(s=>s.people||[]))].sort();
  const addSnippet=useCallback(({text,mode,people,scheduledAt,tags})=>{setSnippets(prev=>[{id:Date.now().toString(),text,mode,people,sharedWith:[],done:false,scheduledAt:scheduledAt||null,scheduledFor:null,photos:[],tags:tags||[],createdAt:Date.now()},...prev]);},[]);
  const updateSnippet=(id,upd)=>setSnippets(prev=>prev.map(s=>s.id===id?{...s,...upd}:s));
  const deleteSnippet=id=>setSnippets(prev=>prev.filter(s=>s.id!==id));

  const allTags=[...new Set(snippets.flatMap(s=>s.tags||[]))].sort();
  const sq=searchQuery.toLowerCase().trim();
  const filtered=snippets.filter(s=>{
    const inTime=filters.timeMs===Infinity||(Date.now()-s.createdAt)<=filters.timeMs;
    const inSearch=!sq||s.text.toLowerCase().includes(sq)||(s.people||[]).some(p=>p.toLowerCase().includes(sq))||(s.tags||[]).some(t=>t.includes(sq));
    const inTags=filters.tags.length===0||(s.tags||[]).some(t=>filters.tags.includes(t));
    const isTell=s.mode==='tell';
    const isDone=isTell?(s.people.length>0&&s.people.every(p=>(s.sharedWith||[]).includes(p))):!!s.done;
    const inStatus=filters.status==='All'||(filters.status==='Done'?isDone:!isDone);
    const inPeople=filters.people.length===0||filters.people.some(p=>(s.people||[]).includes(p));
    const inType=typeFilter==='All'||(typeFilter==='Tell Them'?isTell:!isTell);
    return inTime&&inStatus&&inPeople&&inType&&inSearch&&inTags;
  });
  const sorted=[...filtered].sort((a,b)=>{
    if(sortKey==='asc')return a.createdAt-b.createdAt;
    if(sortKey==='person'){const ap=(a.people||[])[0]||'zzz',bp=(b.people||[])[0]||'zzz';return ap.localeCompare(bp);}
    return b.createdAt-a.createdAt;
  });
  const activeFilters=(filters.timeMs!==Infinity?1:0)+(filters.status!=='All'?1:0)+filters.people.length;
  const closeMenus=()=>{setShowSort(false);setShowView(false);setShowType(false);};

  const tbBtn=(active,onClick,label)=>(
    <button onClick={onClick} style={{background:active?'rgba(36,113,163,0.1)':'rgba(255,255,255,0.75)',border:'1px solid '+(active?'rgba(36,113,163,0.35)':BORDER),borderRadius:9,padding:'6px 12px',cursor:'pointer',color:active?'#1A5C9E':TEXT_SEC,fontSize:12,fontWeight:active?700:500,fontFamily:'inherit',backdropFilter:'blur(4px)',whiteSpace:'nowrap'}}>
      {label}
    </button>
  );


  return(
    <div onClick={closeMenus} style={{minHeight:'100vh',fontFamily:'sans-serif',color:TEXT_PRI}}>

      {/* Background photo */}
      <div style={{position:'fixed',inset:0,zIndex:0,overflow:'hidden'}}>
        <img src={BG_PHOTO} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 55%'}} alt='' />
        <div style={{position:'absolute',inset:0,background:'rgba(220,230,240,0.35)'}} />
      </div>

      {showFilter&&<FilterPanel filters={filters} setFilters={setFilters} allPeople={allPeople} onClose={()=>setShowFilter(false)} />}

      <div style={{maxWidth:600,margin:'0 auto',padding:'28px 14px 60px',position:'relative',zIndex:1}}>

        {/* Header */}
        <div style={{marginBottom:20,textAlign:'center'}}>
          <div style={{display:'inline-block',background:'rgba(255,255,255,0.88)',backdropFilter:'blur(10px)',borderRadius:16,padding:'12px 28px',boxShadow:'0 2px 16px rgba(0,0,0,0.1)'}}>
            <h1 style={{margin:0,fontSize:24,fontWeight:700,letterSpacing:'-0.02em',color:TEXT_PRI,fontFamily:'Georgia,serif'}}>Remember to Tell</h1>
            <p style={{margin:'3px 0 0',fontSize:11,color:TEXT_MUTE,letterSpacing:'0.08em',textTransform:'uppercase'}}>Tap a name to mark as told</p>
          </div>
        </div>

        {/* Input */}
        <InputArea onAdd={addSnippet} allPeople={allPeople} />

        {/* Search bar */}
        <div style={{position:'relative',marginBottom:10}}>
          <input
            value={searchQuery}
            onChange={e=>setSearchQuery(e.target.value)}
            placeholder='Search snippets, names, tags...'
            style={{width:'100%',background:'rgba(255,255,255,0.92)',border:'1px solid '+BORDER,borderRadius:12,padding:'9px 36px 9px 14px',fontSize:13,color:TEXT_PRI,outline:'none',boxSizing:'border-box',boxShadow:'0 1px 8px rgba(0,0,0,0.08)'}}
          />
          {searchQuery&&<button onClick={()=>setSearchQuery('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:TEXT_MUTE,fontSize:16,lineHeight:1,padding:0}}>&#xd7;</button>}
        </div>

        {/* Tags filter strip */}
        {allTags.length>0&&(
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
            <span style={{fontSize:10,color:TEXT_MUTE,textTransform:'uppercase',letterSpacing:'0.08em',whiteSpace:'nowrap'}}>Tags:</span>
            {allTags.map(t=>{
              const active=filters.tags.includes(t);
              return(
                <button key={t} onClick={e=>{e.stopPropagation();setFilters(f=>({...f,tags:active?f.tags.filter(x=>x!==t):[...f.tags,t]}));}} style={{background:active?'rgba(36,113,163,0.14)':'rgba(255,255,255,0.8)',border:'1px solid '+(active?'rgba(36,113,163,0.4)':BORDER),borderRadius:12,padding:'3px 10px',fontSize:11,fontWeight:active?700:500,color:active?'#1A5C9E':TEXT_SEC,cursor:'pointer',fontFamily:'inherit'}}>#{t}</button>
              );
            })}
            {filters.tags.length>0&&<button onClick={e=>{e.stopPropagation();setFilters(f=>({...f,tags:[]}));}} style={{background:'none',border:'none',color:'#c0392b',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>Clear</button>}
          </div>
        )}

        {/* Toolbar */}
        <div onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,flexWrap:'wrap'}}>
          <button onClick={()=>setShowFilter(true)} style={{background:activeFilters>0?'rgba(36,113,163,0.12)':'rgba(255,255,255,0.75)',border:'1px solid '+(activeFilters>0?'rgba(36,113,163,0.35)':BORDER),borderRadius:9,padding:'6px 12px',cursor:'pointer',color:activeFilters>0?'#1A5C9E':TEXT_SEC,fontSize:12,fontWeight:activeFilters>0?700:500,fontFamily:'inherit',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',gap:5}}>
            Filter {activeFilters>0&&<span style={{background:'#2471A3',color:'white',borderRadius:20,padding:'0 6px',fontSize:10,fontWeight:800}}>{activeFilters}</span>}
          </button>

          <div style={{position:'relative'}}>
            {tbBtn(false,()=>{setShowSort(s=>!s);setShowView(false);setShowType(false);},'Sort: '+(SORT_OPTS.find(o=>o.key===sortKey)||SORT_OPTS[0]).label.split(' ')[0])}
            {showSort&&<DropMenu items={SORT_OPTS.map(o=>o.label)} selected={SORT_OPTS.find(o=>o.key===sortKey).label} onSelect={l=>setSortKey((SORT_OPTS.find(o=>o.label===l)||SORT_OPTS[0]).key)} onClose={()=>setShowSort(false)} />}
          </div>

          <div style={{position:'relative'}}>
            {tbBtn(viewMode==='expanded',()=>{setShowView(s=>!s);setShowSort(false);setShowType(false);},'View: '+(viewMode==='expanded'?'Expanded':'Collapsed'))}
            {showView&&<DropMenu items={['Collapsed','Expanded']} selected={viewMode==='collapsed'?'Collapsed':'Expanded'} onSelect={v=>setViewMode(v==='Expanded'?'expanded':'collapsed')} onClose={()=>setShowView(false)} />}
          </div>

          <div style={{position:'relative'}}>
            {tbBtn(typeFilter!=='All',()=>{setShowType(s=>!s);setShowSort(false);setShowView(false);},'Type: '+typeFilter)}
            {showType&&<DropMenu items={['All','Tell Them','Told Me']} selected={typeFilter} onSelect={setTypeFilter} onClose={()=>setShowType(false)} />}
          </div>

          <span style={{marginLeft:'auto',fontSize:11,color:TEXT_MUTE,whiteSpace:'nowrap',background:'rgba(255,255,255,0.7)',borderRadius:8,padding:'3px 8px'}}>{sorted.length}{sorted.length!==snippets.length?' / '+snippets.length:''} entries</span>
        </div>

        {/* List */}
        {sorted.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',color:TEXT_SEC,fontSize:14,fontStyle:'italic',background:'rgba(255,255,255,0.7)',borderRadius:16,backdropFilter:'blur(8px)'}}>
            {snippets.length===0?'Add your first snippet above.':'No entries match these filters.'}
          </div>
        ):sorted.map(s=>(<SnippetCard key={s.id} snippet={s} allPeople={allPeople} onUpdate={upd=>updateSnippet(s.id,upd)} onDelete={()=>deleteSnippet(s.id)} forceExpand={viewMode==='expanded'} />))}
      </div>

      <style dangerouslySetInnerHTML={{__html:`
        *{box-sizing:border-box;}
        textarea::placeholder{color:#9aabb8;font-family:Georgia,serif;font-style:italic;}
